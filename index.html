<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カーニバル・シューティング - カスタム＆連打的追加版</title>
<style>
  /* 全画面設定 */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #000;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
    user-select: none;
    touch-action: none;
  }

  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    /* 背景色はJavaScriptで動的に変更されます */
    background-color: #34495e; 
    cursor: crosshair;
    overflow: hidden;
    perspective: 1000px;
    background-image: 
      linear-gradient(rgba(255,255,255,0.05) 2px, transparent 2px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 2px, transparent 2px);
    background-size: 60px 60px;
    transition: background-color 1s; /* 背景色が変わる際のアニメーション */
  }

  /* 隠し設定トリガー（左上） */
  #settings-trigger {
    position: absolute;
    top: 0; left: 0; width: 80px; height: 80px; z-index: 900;
  }

  /* 重厚感のある緞帳（どんちょう） */
  #curtain {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(to right, #600000, #600000 30px, #8b0000 45px, #8b0000 75px, #600000 90px);
    z-index: 100; transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: inset 0 -30px 60px rgba(0,0,0,0.9);
    display: flex; align-items: flex-end;
  }
  #curtain.open-up { transform: translateY(-100%); }
  .curtain-fringe {
    width: 100%; height: 50px;
    background: repeating-linear-gradient(to right, #ffd700, #ffd700 10px, #daa520 15px, #daa520 25px);
    border-top: 8px solid #b8860b; border-bottom: 6px solid #5c4306;
    box-shadow: 0 15px 20px rgba(0,0,0,0.8); position: absolute; bottom: 0;
  }

  /* 幕の上に表示されるデータ・UI */
  #curtain-content {
    position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; color: #fff; width: 100%; transition: opacity 0.8s ease-in-out; z-index: 105;
  }
  .hidden { display: none !important; }
  .invisible { opacity: 0; pointer-events: none; }

  h1.screen-title { font-size: 72px; color: #ffd700; -webkit-text-stroke: 2px #d35400; text-shadow: 4px 4px 0px #4a0000; margin: 0 0 20px 0; letter-spacing: 5px; }
  .curtain-data { font-size: 32px; font-weight: bold; color: #ecf0f1; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); margin: 10px 0; }
  .curtain-data .val { color: #00ffff; font-size: 42px; -webkit-text-stroke: 1px #005555; text-shadow: 3px 3px 0px #000; }
  .curtain-data.total .val { color: #ff00ff; font-size: 56px; -webkit-text-stroke: 2px #fff; }

  /* ランキングテーブル */
  .ranking-table { margin: 15px auto; border-collapse: collapse; width: 300px; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; background: rgba(0,0,0,0.6); border-radius: 10px; overflow: hidden; }
  .ranking-table th { background: #d35400; color: #fff; padding: 5px; }
  .ranking-table td { padding: 5px 15px; border-bottom: 1px solid #e67e22; font-size: 18px; font-weight: bold;}
  .ranking-table tr:nth-child(even) { background: rgba(255,255,255,0.1); }
  .ranking-table .rank-1 { color: #ffd700; } .ranking-table .rank-2 { color: #c0c0c0; } .ranking-table .rank-3 { color: #cd7f32; }

  /* 名前入力UI */
  #name-entry-area { margin-top: 20px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; border: 3px solid #f1c40f; display: inline-block; }
  #name-input { font-size: 24px; padding: 10px; width: 200px; text-align: center; border-radius: 8px; border: 2px solid #e67e22; font-family: inherit; text-transform: uppercase; }
  .small-btn { font-size: 20px; padding: 10px 20px; margin-left: 10px; }

  /* 的（看板）のスタイル */
  .target-wrapper { position: absolute; width: 70px; height: 90px; perspective: 600px; z-index: 10; }
  .target-wrapper.random-wrapper { width: 40px; height: 40px; }
  .target {
    width: 100%; height: 100%;
    background: radial-gradient(circle, #fff 30%, #e74c3c 35%, #e74c3c 45%, #fff 50%, #fff 60%, #e74c3c 65%);
    border: 4px solid #c0392b; border-radius: 10px; box-shadow: 0 10px 15px rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; color: #333; font-size: 24px; font-family: 'Segoe UI', Tahoma, sans-serif;
    transform-origin: bottom center; transform: rotateX(90deg);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.1s;
    background-color: white; user-select: none;
  }
  .target.up { transform: rotateX(0deg); }
  .target.down { transform: rotateX(90deg); }
  .target.bonus { background: radial-gradient(circle, #fff 30%, #9b59b6 35%, #9b59b6 45%, #fff 50%, #fff 60%, #9b59b6 65%); border-color: #8e44ad; color: #fff; }
  .target.moving-target { background: radial-gradient(circle, #fff 30%, #2ecc71 35%, #2ecc71 45%, #fff 50%, #fff 60%, #2ecc71 65%); border-color: #27ae60; color: #fff; border-radius: 50%; }
  .target.random-target { background: radial-gradient(circle, #fff 30%, #f1c40f 35%, #f1c40f 45%, #fff 50%, #fff 60%, #f1c40f 65%); border-color: #f39c12; color: #d35400; border-radius: 50%; box-shadow: 0 0 30px #f1c40f; font-size: 14px; border-width: 2px; }
  
  /* 連打的（高耐久的）のスタイル */
  .target.rapid-target {
    background: radial-gradient(circle, #333 30%, #e67e22 35%, #e67e22 45%, #333 50%, #333 60%, #e67e22 65%);
    border-color: #d35400; color: #fff; text-shadow: 2px 2px 0 #000; font-size: 36px;
    box-shadow: 0 0 40px #e67e22, inset 0 0 20px #000;
  }
  .target.rapid-target.hit-flash { background: #fff; color: #f00; } /* 叩いた時のフラッシュ */

  /* ボール・エフェクト・スコアポップ */
  .ball { position: absolute; width: 30px; height: 30px; background: radial-gradient(circle at 30% 30%, #f39c12, #d35400); border-radius: 50%; box-shadow: 0 5px 10px rgba(0,0,0,0.5); z-index: 50; pointer-events: none; transition: all 0.2s linear; }
  .hit-effect { position: absolute; font-size: 40px; font-weight: bold; color: #f1c40f; text-shadow: 3px 3px 0 #d35400, -2px -2px 0 #fff; pointer-events: none; animation: hitPop 0.6s forwards; z-index: 60; transform: translate(-50%, -50%); }
  @keyframes hitPop { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); } 50% { transform: translate(-50%, -80%) scale(1.3); } 100% { opacity: 0; transform: translate(-50%, -100%) scale(1); } }
  #score-popup-container { position: absolute; right: 40px; bottom: 40px; z-index: 200; pointer-events: none; display: flex; flex-direction: column; align-items: flex-end; }
  .score-popup { text-align: right; animation: popBounce 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; margin-top: 10px; transform-origin: right center; }
  .score-popup .pts { font-size: 56px; font-weight: 900; color: #39ff14; -webkit-text-stroke: 2px #000; text-shadow: 4px 4px 0 #ff00ff, 0 0 15px rgba(57,255,20,0.8); display: block; line-height: 1; }
  .score-popup .tot { font-size: 28px; font-weight: bold; color: #fff; -webkit-text-stroke: 1px #000; text-shadow: 2px 2px 0 #ff4500; display: block; }
  @keyframes popBounce { 0% { transform: scale(0) rotate(-15deg); opacity: 0; } 15% { transform: scale(1.2) rotate(5deg); opacity: 1; } 30% { transform: scale(1) rotate(-5deg); opacity: 1; } 80% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(0.8) translateY(-50px); opacity: 0; } }

  /* UI・スクリーン画面 */
  .overlay-screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
    justify-content: center; align-items: center; z-index: 300; transition: opacity 0.5s;
  }
  #title-screen h1 { font-size: 70px; color: #f1c40f; -webkit-text-stroke: 3px #e67e22; text-shadow: 5px 5px 0 #c0392b; margin-bottom: 20px; text-align: center; letter-spacing: 5px; }

  button {
    font-family: inherit; font-size: 32px; padding: 15px 50px;
    background: linear-gradient(to bottom, #ff4500, #b30000); color: white;
    border: 4px solid #ffd700; border-radius: 20px; cursor: pointer;
    font-weight: bold; box-shadow: 0 10px 0 #800000, 0 15px 20px rgba(0,0,0,0.6);
    transition: transform 0.1s, box-shadow 0.1s; text-shadow: 2px 2px 0 #000; margin-top: 20px;
  }
  button:hover { filter: brightness(1.1); }
  button:active { transform: translateY(10px); box-shadow: 0 0 0 #800000, 0 5px 10px rgba(0,0,0,0.6); }

  /* 設定画面スタイル */
  .settings-box {
    background: #34495e; border: 4px solid #f1c40f; border-radius: 15px;
    padding: 20px 30px; text-align: left; color: white; width: 450px;
    max-height: 80vh; overflow-y: auto; /* スクロール可能に */
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  }
  .settings-box h2 { color: #f1c40f; margin-top:0; text-align: center; border-bottom: 2px solid #e67e22; padding-bottom: 10px;}
  .settings-box h3 { color: #39ff14; font-size: 20px; margin: 20px 0 10px 0; }
  .settings-row { margin: 10px 0; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
  .settings-row input[type="number"], .settings-row select { font-size: 18px; width: 100px; text-align: center; border-radius: 5px; border: 2px solid #e67e22; font-family: inherit;}
  .settings-row input[type="color"] { width: 60px; height: 35px; border: none; cursor: pointer; background: transparent; }
  .settings-row input[type="checkbox"] { width: 25px; height: 25px; cursor: pointer; }
</style>
</head>
<body>

  <div id="game-container">
    <div id="settings-trigger"></div>
    <div id="curtain">
      <div id="curtain-content" class="invisible">
        <div id="result-area">
          <h1 id="im-title" class="screen-title">STAGE CLEAR!</h1>
          <div class="curtain-data">STAGE SCORE: <span id="im-stage-score" class="val">0</span></div>
          <div class="curtain-data">HITS: <span id="im-stage-hits" class="val">0</span></div>
          <div class="curtain-data total" style="margin-top: 30px;">TOTAL SCORE: <span id="im-total-score" class="val">0</span></div>
        </div>
        <div id="name-entry-area" class="hidden">
          <div style="font-size: 28px; color: #39ff14; font-weight: bold; margin-bottom: 10px; -webkit-text-stroke: 1px #000;">NEW HIGH SCORE!!</div>
          <input type="text" id="name-input" maxlength="8" placeholder="ENTER NAME">
          <button id="register-btn" class="small-btn">REGISTER</button>
        </div>
        <div id="result-ranking-area" class="hidden">
          <h2 style="color: #ffd700; margin: 0 0 10px 0; -webkit-text-stroke: 1px #000;">TOP 10 RANKING</h2>
          <table class="ranking-table" id="result-ranking-table"></table>
        </div>
        <button id="restart-btn" class="hidden">PLAY AGAIN</button>
      </div>
      <div class="curtain-fringe"></div>
    </div>
    
    <div id="score-popup-container"></div>

    <div id="title-screen" class="overlay-screen">
      <h1>CARNIVAL<br>SHOOTING</h1>
      <div style="background: rgba(0,0,0,0.6); border: 2px solid #f1c40f; border-radius: 10px; padding: 15px; margin-bottom: 20px;">
        <h2 style="margin: 0 0 10px 0; color: #fff; font-size: 24px; text-align: center;">TOP RANKING</h2>
        <table class="ranking-table" id="title-ranking-table" style="width: 250px; margin: 0;"></table>
      </div>
      <button id="start-btn" style="margin-top: 0;">GAME START!</button>
    </div>

    <div id="settings-screen" class="overlay-screen hidden" style="z-index: 999;">
      <div class="settings-box">
        <h2>GAME SETTINGS</h2>
        
        <h3>基本設定</h3>
        <div class="settings-row">
          <label>ステージ時間 (秒):</label>
          <input type="number" id="cfg-stage-time" min="10" max="60">
        </div>
        <div class="settings-row">
          <label>幕間の待機時間 (秒):</label>
          <input type="number" id="cfg-intermission" min="2" max="30">
        </div>

        <h3>連打的（ボス）設定</h3>
        <div class="settings-row">
          <label>ステージ最後に出現させる:</label>
          <input type="checkbox" id="cfg-rapid-enable">
        </div>
        <div class="settings-row">
          <label>耐久力 (HP):</label>
          <input type="number" id="cfg-rapid-hp" min="1" max="999">
        </div>
        <div class="settings-row">
          <label>大きさ (px):</label>
          <input type="number" id="cfg-rapid-size" min="50" max="300">
        </div>
        <div class="settings-row">
          <label>出現個数:</label>
          <input type="number" id="cfg-rapid-count" min="1" max="10">
        </div>
        <div class="settings-row">
          <label>出現場所:</label>
          <select id="cfg-rapid-pos">
            <option value="center">中央</option>
            <option value="left">左側</option>
            <option value="right">右側</option>
            <option value="random">ランダム</option>
          </select>
        </div>

        <h3>背景色設定</h3>
        <div class="settings-row"><label>STAGE 1:</label><input type="color" id="cfg-bg-1"></div>
        <div class="settings-row"><label>STAGE 2:</label><input type="color" id="cfg-bg-2"></div>
        <div class="settings-row"><label>STAGE 3:</label><input type="color" id="cfg-bg-3"></div>
        <div class="settings-row"><label>STAGE 4:</label><input type="color" id="cfg-bg-4"></div>
        <div class="settings-row"><label>STAGE 5:</label><input type="color" id="cfg-bg-5"></div>

        <div style="text-align: center;">
          <button id="save-settings-btn" class="small-btn" style="margin-top: 20px; font-size: 24px;">SAVE & CLOSE</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('game-container');
    const curtain = document.getElementById('curtain');
    const curtainContent = document.getElementById('curtain-content');
    const scorePopupContainer = document.getElementById('score-popup-container');
    
    // UIスクリーン要素
    const titleScreen = document.getElementById('title-screen');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const resultArea = document.getElementById('result-area');
    const imTitle = document.getElementById('im-title');
    const imStageScore = document.getElementById('im-stage-score');
    const imStageHits = document.getElementById('im-stage-hits');
    const imTotalScore = document.getElementById('im-total-score');
    const nameEntryArea = document.getElementById('name-entry-area');
    const nameInput = document.getElementById('name-input');
    const registerBtn = document.getElementById('register-btn');
    const resultRankingArea = document.getElementById('result-ranking-area');
    const titleRankingTable = document.getElementById('title-ranking-table');
    const resultRankingTable = document.getElementById('result-ranking-table');

    // 設定要素
    const settingsTrigger = document.getElementById('settings-trigger');
    const settingsScreen = document.getElementById('settings-screen');
    const saveSettingsBtn = document.getElementById('save-settings-btn');

    // --- コンフィグ（設定値）の初期化とマイグレーション ---
    let appConfig = JSON.parse(localStorage.getItem('carnivalConfig')) || {};
    
    // デフォルト値の補完（新しく追加された項目への対応）
    appConfig = {
      stageDurationSec: appConfig.stageDurationSec || 25,
      intermissionDurationSec: appConfig.intermissionDurationSec || 9,
      rapidEnable: appConfig.rapidEnable !== undefined ? appConfig.rapidEnable : true, // デフォルトON
      rapidHp: appConfig.rapidHp || 20,
      rapidSize: appConfig.rapidSize || 150,
      rapidCount: appConfig.rapidCount || 1,
      rapidPos: appConfig.rapidPos || 'center',
      bgColors: appConfig.bgColors || ['#34495e', '#2c3e50', '#8e44ad', '#27ae60', '#c0392b']
    };
    
    let highScores = JSON.parse(localStorage.getItem('carnivalHighScores')) || [];

    // --- 設定画面の入出力 ---
    function loadSettingsToUI() {
      document.getElementById('cfg-stage-time').value = appConfig.stageDurationSec;
      document.getElementById('cfg-intermission').value = appConfig.intermissionDurationSec;
      document.getElementById('cfg-rapid-enable').checked = appConfig.rapidEnable;
      document.getElementById('cfg-rapid-hp').value = appConfig.rapidHp;
      document.getElementById('cfg-rapid-size').value = appConfig.rapidSize;
      document.getElementById('cfg-rapid-count').value = appConfig.rapidCount;
      document.getElementById('cfg-rapid-pos').value = appConfig.rapidPos;
      for(let i=1; i<=5; i++) {
        document.getElementById(`cfg-bg-${i}`).value = appConfig.bgColors[i-1];
      }
    }

    function saveSettingsFromUI() {
      appConfig.stageDurationSec = parseInt(document.getElementById('cfg-stage-time').value) || 25;
      appConfig.intermissionDurationSec = Math.max(2, parseInt(document.getElementById('cfg-intermission').value) || 9);
      appConfig.rapidEnable = document.getElementById('cfg-rapid-enable').checked;
      appConfig.rapidHp = Math.max(1, parseInt(document.getElementById('cfg-rapid-hp').value) || 20);
      appConfig.rapidSize = Math.max(50, parseInt(document.getElementById('cfg-rapid-size').value) || 150);
      appConfig.rapidCount = Math.max(1, parseInt(document.getElementById('cfg-rapid-count').value) || 1);
      appConfig.rapidPos = document.getElementById('cfg-rapid-pos').value;
      
      let newBgs = [];
      for(let i=1; i<=5; i++) {
        newBgs.push(document.getElementById(`cfg-bg-${i}`).value);
      }
      appConfig.bgColors = newBgs;

      localStorage.setItem('carnivalConfig', JSON.stringify(appConfig));
      settingsScreen.classList.add('hidden');
    }

    // 長押し設定トリガー
    let pressTimer;
    settingsTrigger.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      pressTimer = window.setTimeout(() => {
        loadSettingsToUI();
        settingsScreen.classList.remove('hidden');
      }, 2000);
    });
    settingsTrigger.addEventListener('pointerup', () => clearTimeout(pressTimer));
    settingsTrigger.addEventListener('pointerleave', () => clearTimeout(pressTimer));
    settingsTrigger.addEventListener('pointercancel', () => clearTimeout(pressTimer));
    saveSettingsBtn.addEventListener('click', saveSettingsFromUI);

    // --- ランキング処理 ---
    updateRankingTables();

    function isHighScore(score) {
      if (score === 0) return false;
      if (highScores.length < 10) return true;
      return score > highScores[highScores.length - 1].score;
    }

    function saveHighScore(name, score) {
      const entryName = name.trim().toUpperCase() || "UNKNOWN";
      highScores.push({ name: entryName, score: score });
      highScores.sort((a, b) => b.score - a.score);
      highScores = highScores.slice(0, 10);
      localStorage.setItem('carnivalHighScores', JSON.stringify(highScores));
      updateRankingTables();
    }

    function updateRankingTables() {
      const generateHTML = (scores) => {
        if (scores.length === 0) return `<tr><td colspan="3" style="text-align:center;">NO DATA</td></tr>`;
        return scores.map((s, i) => {
          let rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
          return `<tr class="${rankClass}"><td>${i + 1}</td><td style="text-align: left;">${s.name}</td><td style="text-align: right;">${s.score}</td></tr>`;
        }).join('');
      };
      const html = generateHTML(highScores);
      titleRankingTable.innerHTML = html;
      resultRankingTable.innerHTML = html;
    }

    // --- ゲーム状態管理 ---
    let totalScore = 0, totalHits = 0, stageScore = 0, stageHits = 0;
    let currentStage = 1;
    const maxStages = 5;
    let isStageActive = false;
    let spawnInterval;
    let animationFrames = [];

    startBtn.addEventListener('click', () => { titleScreen.classList.add('hidden'); startGame(); });
    restartBtn.addEventListener('click', () => {
      curtainContent.classList.add('invisible');
      setTimeout(() => {
        restartBtn.classList.add('hidden');
        resultRankingArea.classList.add('hidden');
        resultArea.classList.remove('hidden');
        startGame();
      }, 500); 
    });

    function startGame() {
      totalScore = 0; totalHits = 0; currentStage = 1;
      runStageSequence();
    }

    function runStageSequence() {
      stageScore = 0; stageHits = 0; isStageActive = false;
      
      // 背景色の適用（設定値から取得）
      container.style.backgroundColor = appConfig.bgColors[currentStage - 1];

      createFormation();

      setTimeout(() => {
        curtain.classList.add('open-up');
        
        setTimeout(() => {
          isStageActive = true;
          startSpawning();
          
          const stageTimeMs = appConfig.stageDurationSec * 1000;
          
          // 最終ステージの5000点的（半分の時間で出現）
          if (currentStage === maxStages) {
            setTimeout(() => { if (isStageActive) createRandomTarget(); }, stageTimeMs / 2);
          }

          // ★連打的の出現（ステージ終了の5秒前）
          if (appConfig.rapidEnable) {
            let rapidSpawnTime = stageTimeMs - 5000;
            if (rapidSpawnTime < 0) rapidSpawnTime = 0; // ステージ時間が短すぎる場合の保護
            setTimeout(() => { if (isStageActive) spawnRapidTargets(); }, rapidSpawnTime);
          }
          
          setTimeout(() => endStageSequence(), stageTimeMs);
        }, 2500);
      }, 1000);
    }

    function endStageSequence() {
      isStageActive = false;
      clearInterval(spawnInterval);
      
      document.querySelectorAll('.target.up').forEach(t => {
        t.classList.remove('up'); t.classList.add('down');
      });

      setTimeout(() => {
        curtain.classList.remove('open-up');
        setTimeout(() => {
          document.querySelectorAll('.target-wrapper').forEach(el => el.remove());
          animationFrames.forEach(cancelAnimationFrame);
          animationFrames = [];
          showIntermission();
        }, 2500);
      }, 500);
    }

    function showIntermission() {
      imStageScore.textContent = stageScore; imStageHits.textContent = stageHits; imTotalScore.textContent = totalScore;
      resultArea.classList.remove('hidden'); nameEntryArea.classList.add('hidden'); resultRankingArea.classList.add('hidden'); restartBtn.classList.add('hidden');

      if (currentStage >= maxStages) {
        imTitle.textContent = "ALL STAGE CLEAR!!"; imTitle.style.color = "#39ff14";
        curtainContent.classList.remove('invisible');
        if (isHighScore(totalScore)) {
          setTimeout(() => {
            resultArea.classList.add('hidden'); nameEntryArea.classList.remove('hidden');
            nameInput.value = ''; nameInput.focus();
          }, 2000);
        } else {
          setTimeout(() => {
            resultArea.classList.add('hidden'); resultRankingArea.classList.remove('hidden'); restartBtn.classList.remove('hidden');
          }, 3000);
        }
      } else {
        imTitle.textContent = `STAGE ${currentStage} CLEAR!`; imTitle.style.color = "#ffd700";
        curtainContent.classList.remove('invisible');
        setTimeout(() => {
          curtainContent.classList.add('invisible');
          setTimeout(() => { currentStage++; runStageSequence(); }, 800); 
        }, appConfig.intermissionDurationSec * 1000); 
      }
    }

    registerBtn.addEventListener('click', () => {
      saveHighScore(nameInput.value, totalScore);
      nameEntryArea.classList.add('hidden'); resultRankingArea.classList.remove('hidden'); restartBtn.classList.remove('hidden');
    });

    // --- 的の生成ロジック ---
    function createFormation() {
      const rows = 2, cols = 4;
      const cw = window.innerWidth, ch = window.innerHeight;
      const xSpacing = (cw * 0.6) / (cols - 1);
      const startX = (cw - (cw * 0.6)) / 2; 
      const startY = ch * 0.4;
      const ySpacing = 130;
      for(let r=0; r < rows; r++) {
        for(let c=0; c < cols; c++) {
          createStaticTarget(startX + c * xSpacing, startY + r * ySpacing, 10000, true);
        }
      }
    }

    function startSpawning() {
      const spawnRate = Math.max(800, 2000 - (currentStage * 250));
      spawnInterval = setInterval(() => {
        if (!isStageActive) return;
        spawnTargetGroup();
        if (Math.random() < 0.2) createMovingTarget();
      }, spawnRate);
    }

    function spawnTargetGroup() {
      const cw = window.innerWidth, ch = window.innerHeight;
      const count = Math.floor(Math.random() * 3) + 2;
      const targetW = 70, spacing = 30;
      const totalWidth = (targetW * count) + (spacing * (count - 1));
      const startX = Math.random() * (cw - totalWidth - 60) + 30;
      const startY = Math.random() * (ch - 250) + 100;
      const stayUpTime = Math.max(1500, 4000 - (currentStage * 500));
      for (let i = 0; i < count; i++) {
        createStaticTarget(startX + i * (targetW + spacing), startY, stayUpTime, false);
      }
    }

    function createStaticTarget(x, y, stayUpTime, isFormation) {
      const wrapper = document.createElement('div');
      wrapper.className = 'target-wrapper';
      wrapper.style.left = `${x}px`; wrapper.style.top = `${y}px`;
      const target = document.createElement('div');
      target.className = 'target';
      const isBonus = Math.random() > 0.8;
      const points = isBonus ? 500 : 100;
      target.dataset.points = points; target.textContent = points;
      if (isBonus) target.classList.add('bonus');
      wrapper.appendChild(target); container.appendChild(wrapper);
      if (isFormation) {
        target.classList.add('up'); target.classList.remove('down');
      } else {
        setTimeout(() => {
          if (!isStageActive) return; target.classList.add('up'); target.classList.remove('down');
        }, Math.random() * 300);
      }
      setTimeout(() => {
        if (target.classList.contains('up')) {
          target.classList.remove('up'); target.classList.add('down');
          setTimeout(() => wrapper.remove(), 300);
        }
      }, isFormation ? stayUpTime + 3000 : stayUpTime); 
    }

    function createMovingTarget() {
      const wrapper = document.createElement('div');
      wrapper.className = 'target-wrapper';
      const startY = Math.random() * (window.innerHeight - 300) + 100;
      const direction = Math.random() > 0.5 ? 1 : -1;
      const startX = direction === 1 ? -100 : window.innerWidth + 100;
      wrapper.style.left = `${startX}px`; wrapper.style.top = `${startY}px`;
      const target = document.createElement('div');
      target.className = 'target up moving-target';
      target.dataset.points = 1000; target.textContent = "1000";
      wrapper.appendChild(target); container.appendChild(wrapper);
      const speed = Math.random() * 4 + 4;
      let currentX = startX;
      function move() {
        if (!isStageActive || !container.contains(wrapper)) return;
        currentX += speed * direction; wrapper.style.left = `${currentX}px`;
        if ((direction === 1 && currentX > window.innerWidth + 100) || (direction === -1 && currentX < -100)) wrapper.remove();
        else animationFrames.push(requestAnimationFrame(move));
      }
      animationFrames.push(requestAnimationFrame(move));
    }

    function createRandomTarget() {
      const wrapper = document.createElement('div');
      wrapper.className = 'target-wrapper random-wrapper'; 
      let x = window.innerWidth / 2, y = window.innerHeight / 2;
      let vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 7 + 15);
      let vy = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 7 + 15);
      wrapper.style.left = `${x}px`; wrapper.style.top = `${y}px`; wrapper.style.zIndex = "30"; 
      const target = document.createElement('div');
      target.className = 'target up random-target';
      target.dataset.points = 5000; target.textContent = "5k"; 
      wrapper.appendChild(target); container.appendChild(wrapper);
      function move() {
        if (!isStageActive || !container.contains(wrapper)) return;
        x += vx; y += vy;
        if (x < 10 || x > window.innerWidth - 50) vx *= -1;
        if (y < 10 || y > window.innerHeight - 80) vy *= -1;
        wrapper.style.left = `${x}px`; wrapper.style.top = `${y}px`;
        animationFrames.push(requestAnimationFrame(move));
      }
      animationFrames.push(requestAnimationFrame(move));
    }

    // ★連打的（ボス）の生成
    function spawnRapidTargets() {
      const count = appConfig.rapidCount;
      const size = appConfig.rapidSize;
      const pos = appConfig.rapidPos;
      const spacing = 40;
      const totalW = (size * count) + (spacing * (count - 1));
      
      const cw = window.innerWidth;
      const ch = window.innerHeight;
      
      for(let i = 0; i < count; i++) {
        let x, y;
        y = ch - size - 100; // 画面下寄りに配置
        
        if (pos === 'random') {
          x = Math.random() * (cw - size - 40) + 20;
          y = Math.random() * (ch - size - 150) + 50;
        } else if (pos === 'left') {
          x = 50 + i * (size + spacing);
        } else if (pos === 'right') {
          x = cw - totalW - 50 + i * (size + spacing);
        } else { // center
          x = (cw - totalW) / 2 + i * (size + spacing);
        }

        createRapidTarget(x, y, size);
      }
    }

    function createRapidTarget(x, y, size) {
      const wrapper = document.createElement('div');
      wrapper.className = 'target-wrapper';
      wrapper.style.width = `${size}px`;
      wrapper.style.height = `${size}px`;
      wrapper.style.left = `${x}px`;
      wrapper.style.top = `${y}px`;
      wrapper.style.zIndex = "40"; // 少し手前

      const target = document.createElement('div');
      target.className = 'target rapid-target';
      target.dataset.hp = appConfig.rapidHp;
      target.textContent = appConfig.rapidHp; // 残りHPを表示

      wrapper.appendChild(target);
      container.appendChild(wrapper);

      setTimeout(() => {
        if (isStageActive) {
          target.classList.add('up');
          target.classList.remove('down');
        }
      }, 100);
    }

    // --- 射撃とスコア処理 ---
    function addScore(points) {
      totalScore += points; stageScore += points;
      totalHits++; stageHits++;
      const popup = document.createElement('div');
      popup.className = 'score-popup';
      popup.innerHTML = `<span class="pts">+${points}</span><span class="tot">TOTAL: ${totalScore}</span>`;
      scorePopupContainer.appendChild(popup);
      setTimeout(() => { if (scorePopupContainer.contains(popup)) popup.remove(); }, 2000);
    }

    container.addEventListener('pointerdown', (e) => {
      if (e.clientX < 80 && e.clientY < 80 && !isStageActive) return; // 左上は除外
      if (!isStageActive) return; 
      e.preventDefault(); 
      const clickX = e.clientX, clickY = e.clientY;
      shootBall(clickX, clickY);

      let targetEl = e.target.closest('.target');
      if (targetEl && targetEl.classList.contains('up')) {
        
        // ★連打的の処理
        if (targetEl.classList.contains('rapid-target')) {
          let currentHp = parseInt(targetEl.dataset.hp);
          currentHp--;
          
          if (currentHp > 0) {
            // まだ壊れない（HPを減らしてスコア加算）
            targetEl.dataset.hp = currentHp;
            targetEl.textContent = currentHp;
            
            // ヒットフラッシュ演出
            targetEl.classList.add('hit-flash');
            setTimeout(() => targetEl.classList.remove('hit-flash'), 100);
            
            setTimeout(() => {
              addScore(100); // 1叩きにつき100点
              showHitEffect(clickX, clickY, 100);
            }, 150);
          } else {
            // 破壊された場合（大きなスコアボーナス）
            targetEl.classList.remove('up');
            setTimeout(() => {
              targetEl.classList.add('down');
              addScore(5000); // 破壊ボーナス 5000点
              showHitEffect(clickX, clickY, 5000);
              setTimeout(() => targetEl.closest('.target-wrapper').remove(), 300);
            }, 150);
          }
        } 
        // 通常の的の処理
        else {
          const points = parseInt(targetEl.dataset.points);
          targetEl.classList.remove('up');
          setTimeout(() => {
            if (targetEl.classList.contains('moving-target') || targetEl.classList.contains('random-target')) {
              targetEl.closest('.target-wrapper').remove();
            } else {
              targetEl.classList.add('down');
            }
            addScore(points);
            showHitEffect(clickX, clickY, points);
          }, 150); 
        }
      }
    });

    function shootBall(targetX, targetY) {
      const ball = document.createElement('div');
      ball.className = 'ball';
      const startX = window.innerWidth / 2 - 15;
      const startY = window.innerHeight - 30;
      ball.style.left = `${startX}px`; ball.style.top = `${startY}px`;
      ball.style.transform = 'scale(2)';
      container.appendChild(ball);
      ball.getBoundingClientRect(); 
      ball.style.left = `${targetX - 15}px`; ball.style.top = `${targetY - 15}px`;
      ball.style.transform = 'scale(0.3)';
      setTimeout(() => { if (container.contains(ball)) ball.remove(); }, 200);
    }

    function showHitEffect(x, y, points) {
      const effect = document.createElement('div');
      effect.className = 'hit-effect';
      effect.textContent = `+${points}`;
      effect.style.left = `${x}px`; effect.style.top = `${y}px`;
      container.appendChild(effect);
      setTimeout(() => { if (container.contains(effect)) effect.remove(); }, 600);
    }
  </script>
</body>
